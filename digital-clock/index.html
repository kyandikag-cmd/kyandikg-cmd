<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Clock - Multiple Time Zones</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🌍 Global Digital Clock</h1>
        <p class="subtitle">Real-time display across multiple time zones</p>
        
        <div class="controls">
            <input type="text" id="searchInput" class="search-box" placeholder="Search time zones...">
            <button id="addZoneBtn" class="btn-add">+ Add Time Zone</button>
        </div>

        <div id="timezoneModal" class="modal">
            <div class="modal-content">
                <span class="close">&times;</span>
                <h2>Add Time Zone</h2>
                <input type="text" id="timezoneSearch" class="timezone-search" placeholder="Search (e.g., New York, Tokyo, London)...">
                <div id="timezoneList" class="timezone-list"></div>
            </div>
        </div>

        <div class="clocks-grid" id="clocksGrid">
            <!-- Clocks will be dynamically added here -->
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
